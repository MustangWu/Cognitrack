name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
      - 'iteration*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Clean dev dependencies for deployment
        run: npm prune --production

      - name: Select publish profile
        id: profile
        run: |
          case "${{ github.ref_name }}" in
            iteration1) echo "secret=AZURE_WEBAPP_PUBLISH_PROFILE_ITERATION1" >> $GITHUB_OUTPUT ;;
            iteration2) echo "secret=AZURE_WEBAPP_PUBLISH_PROFILE_ITERATION2" >> $GITHUB_OUTPUT ;;
            *)          echo "secret=AZURE_WEBAPP_PUBLISH_PROFILE"             >> $GITHUB_OUTPUT ;;
          esac

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: Cognitrack
          slot-name: ${{ github.ref_name != 'main' && github.ref_name || 'production' }}
          publish-profile: ${{ secrets[steps.profile.outputs.secret] }}
          package: .
