name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
      - 'iteration*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Clean dev dependencies for deployment
        run: npm prune --production

      - name: Deploy to production (main)
        if: github.ref_name == 'main'
        uses: azure/webapps-deploy@v2
        with:
          app-name: Cognitrack
          slot-name: production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Deploy to iteration1
        if: github.ref_name == 'iteration1'
        uses: azure/webapps-deploy@v2
        with:
          app-name: Cognitrack
          slot-name: iteration1
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ITERATION1 }}
          package: .

      - name: Deploy to iteration2
        if: github.ref_name == 'iteration2'
        uses: azure/webapps-deploy@v2
        with:
          app-name: Cognitrack
          slot-name: iteration2
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ITERATION2 }}
          package: .
